name: CI

on:
  push:
    branches: [v2, main]
  pull_request:
    branches: [v2, main]

# Cancel superseded runs on the same ref so a rapid push sequence does not pile up builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: lint, format, typecheck, unit tests, build. Kept separate from E2E so a
  # lint/type failure surfaces in seconds without waiting on the browser job.
  checks:
    name: Lint / typecheck / unit / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

  # DOM-integration tests against the production build. The Playwright config builds and previews
  # the site and starts the cross-origin embed stub; here we only install the browser.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
